name: Distribution

on:
  push:
    branches: [main]

concurrency:
  group: dist-${{ github.ref }}
  cancel-in-progress: true

jobs:
  zip-integrity:
    name: Zip integrity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: sqlite3, pdo_sqlite
          tools: composer

      - name: Install production dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: Build zip
        run: |
          mkdir -p dist
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.claude' \
            --exclude='tests' \
            --exclude='docs' \
            --exclude='node_modules' \
            --exclude='CLAUDE.md' \
            --exclude='phpunit.xml*' \
            --exclude='phpcs.xml*' \
            --exclude='.wp-env.json' \
            --exclude='dist' \
            . dist/rudel/
          cd dist && zip -r rudel.zip rudel/

      - name: Verify required files
        run: |
          cd dist/rudel
          for f in rudel.php bootstrap.php src/EnvironmentManager.php cli/RudelCommand.php vendor/autoload.php; do
            test -f "$f" || { echo "Missing: $f"; exit 1; }
          done
          test -d templates || { echo "Missing: templates/"; exit 1; }
          echo "All required files present."

      - name: Verify no dev files leaked
        run: |
          cd dist/rudel
          for f in phpunit.xml phpunit.xml.dist phpcs.xml phpcs.xml.dist .wp-env.json CLAUDE.md; do
            test ! -f "$f" || { echo "Dev file leaked: $f"; exit 1; }
          done
          test ! -d tests || { echo "Dev directory leaked: tests/"; exit 1; }
          test ! -d .github || { echo "Dev directory leaked: .github/"; exit 1; }
          echo "No dev files in zip."

      - name: Verify PHP syntax
        run: find dist/rudel -name '*.php' -print0 | xargs -0 -n1 php -l

      - name: Verify autoloader resolves classes
        run: |
          php -r "
            \$loader = require 'dist/rudel/vendor/autoload.php';
            \$classes = ['Rudel\\\EnvironmentManager', 'Rudel\\\CLI\\\RudelCommand'];
            foreach (\$classes as \$c) {
              if (!\$loader->findFile(\$c)) { echo \"Class not found: \$c\n\"; exit(1); }
            }
            echo \"Autoloader OK.\n\";
          "

      - name: Upload zip artifact
        uses: actions/upload-artifact@v7
        with:
          name: rudel-zip
          path: dist/rudel.zip

  wordpress-activation:
    name: WordPress activation
    needs: zip-integrity
    runs-on: ubuntu-latest
    steps:
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: sqlite3, pdo_sqlite, mysqli
          tools: wp-cli

      - name: Download zip artifact
        uses: actions/download-artifact@v8
        with:
          name: rudel-zip

      - name: Start MySQL
        run: |
          sudo systemctl start mysql
          mysql -u root -proot -e "CREATE DATABASE IF NOT EXISTS wordpress;"

      - name: Install WordPress
        run: |
          mkdir wordpress && cd wordpress
          wp core download
          wp config create --dbname=wordpress --dbuser=root --dbpass=root
          wp core install --url=http://localhost --title=Test \
            --admin_user=admin --admin_password=admin --admin_email=test@example.com --skip-email

      - name: Install and activate Rudel
        run: |
          cd wordpress
          wp plugin install ../rudel.zip --activate

      - name: Verify plugin is active
        run: |
          cd wordpress
          wp plugin list --status=active --field=name | grep -q rudel
          echo "Plugin is active"

      - name: Verify plugin loads
        run: |
          cd wordpress
          wp eval "echo 'RUDEL_VERSION: ' . RUDEL_VERSION . PHP_EOL;"

      - name: Verify CLI commands
        run: |
          cd wordpress
          wp rudel status

  packagist-install:
    name: Packagist install
    runs-on: ubuntu-latest
    steps:
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: sqlite3, pdo_sqlite, mysqli
          tools: wp-cli

      - name: Install via Composer from Packagist
        run: |
          mkdir -p test-project && cd test-project
          composer init --no-interaction --name=test/rudel-packagist
          composer config minimum-stability dev
          composer config prefer-stable true
          composer require rudel/rudel:dev-main --no-interaction

      - name: Verify package installed
        run: |
          cd test-project
          test -f vendor/rudel/rudel/rudel.php
          echo "Plugin files installed from Packagist"

      - name: Verify autoloader resolves classes
        run: |
          cd test-project
          php -r "
            \$loader = require 'vendor/autoload.php';
            \$classes = ['Rudel\\\EnvironmentManager', 'Rudel\\\CLI\\\RudelCommand'];
            foreach (\$classes as \$c) {
              if (!\$loader->findFile(\$c)) { echo \"Class not found: \$c\n\"; exit(1); }
            }
            echo \"Packagist install: classes resolve\n\";
          "

      - name: Start MySQL
        run: |
          sudo systemctl start mysql
          mysql -u root -proot -e "CREATE DATABASE IF NOT EXISTS wordpress;"

      - name: Set up WordPress with Packagist-installed plugin
        run: |
          mkdir wordpress && cd wordpress
          wp core download
          wp config create --dbname=wordpress --dbuser=root --dbpass=root
          wp core install --url=http://localhost --title=Test \
            --admin_user=admin --admin_password=admin --admin_email=test@example.com --skip-email
          ln -s $GITHUB_WORKSPACE/test-project/vendor/rudel/rudel wp-content/plugins/rudel
          wp plugin activate rudel

      - name: Verify plugin loads
        run: |
          cd wordpress
          wp eval "echo 'RUDEL_VERSION: ' . RUDEL_VERSION . PHP_EOL;"

      - name: Verify CLI commands
        run: |
          cd wordpress
          wp rudel status

  composer-install:
    name: Composer install
    runs-on: ubuntu-latest
    steps:
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: sqlite3, pdo_sqlite, mysqli
          tools: composer, wp-cli

      - name: Create test project
        run: |
          mkdir -p test-project
          cd test-project
          cat > composer.json << 'COMPOSER'
          {
            "repositories": [
              {
                "type": "vcs",
                "url": "https://github.com/${{ github.repository }}"
              }
            ],
            "require": {
              "rudel/rudel": "dev-${{ github.ref_name }}"
            }
          }
          COMPOSER

      - name: Install via Composer
        run: |
          cd test-project
          composer install --no-interaction --prefer-dist
        env:
          COMPOSER_AUTH: '{"github-oauth": {"github.com": "${{ secrets.GITHUB_TOKEN }}"}}'

      - name: Verify package installed
        run: |
          cd test-project
          test -f vendor/rudel/rudel/rudel.php
          echo "Plugin files installed"

      - name: Verify autoloader resolves classes
        run: |
          cd test-project
          php -r "
            \$loader = require 'vendor/autoload.php';
            \$classes = ['Rudel\\\EnvironmentManager', 'Rudel\\\CLI\\\RudelCommand'];
            foreach (\$classes as \$c) {
              if (!\$loader->findFile(\$c)) { echo \"Class not found: \$c\n\"; exit(1); }
            }
            echo \"Composer install: classes resolve\n\";
          "

      - name: Start MySQL
        run: |
          sudo systemctl start mysql
          mysql -u root -proot -e "CREATE DATABASE IF NOT EXISTS wordpress;"

      - name: Set up WordPress with Composer-installed plugin
        run: |
          mkdir wordpress && cd wordpress
          wp core download
          wp config create --dbname=wordpress --dbuser=root --dbpass=root
          wp core install --url=http://localhost --title=Test \
            --admin_user=admin --admin_password=admin --admin_email=test@example.com --skip-email
          ln -s $GITHUB_WORKSPACE/test-project/vendor/rudel/rudel wp-content/plugins/rudel
          wp plugin activate rudel

      - name: Verify plugin loads
        run: |
          cd wordpress
          wp eval "echo 'RUDEL_VERSION: ' . RUDEL_VERSION . PHP_EOL;"

      - name: Verify CLI commands
        run: |
          cd wordpress
          wp rudel status
